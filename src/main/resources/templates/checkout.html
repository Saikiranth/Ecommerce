<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Checkout</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
    padding: 0;
}

.container {
    width: 80%;
    margin: 40px auto;
}

h2 {
    text-align: center;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    margin-top: 20px;
}

th {
    background: #111827;
    color: white;
    padding: 12px;
}

td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

.total-box {
    text-align: right;
    font-size: 20px;
    margin-top: 20px;
    font-weight: bold;
}

.btn-container {
    text-align: center;
    margin-top: 30px;
}

button {
    background: #28a745;
    color: white;
    padding: 12px 25px;
    border: none;
    border-radius: 6px;
}
</style>

</head>

<body>

<div class="container">

    <h2>Checkout</h2>

    <!-- ITEMS -->
    <table>
        <tr>
            <th>Product</th>
            <th>Price</th>
        </tr>

        <tr th:each="item : ${items}">
            <td th:text="${item.name}"></td>
            <td th:text="${item.price}"></td>
        </tr>
    </table>

    <!-- TOTAL -->
    <div class="total-box">
        Total: ₹ <span th:text="${total}"></span>
    </div>

    <!-- PLACE ORDER -->
    <div class="btn-container">

        <form action="/placeOrder" method="post">

            <input type="hidden" name="total" th:value="${total}"/>

            <!-- OPTIONAL (only if Spring Security enabled) -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <button type="submit">💳 Pay Now</button>

        </form>

    </div>

</div>

</body>
</html>
