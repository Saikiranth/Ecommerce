<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Shopping Cart</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
    margin: 0;
    padding: 0;
}

.container {
    width: 85%;
    margin: 40px auto;
}

h2 {
    text-align: center;
    margin-bottom: 30px;
    color: #111827;
}

.cart-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    padding: 15px;
    text-align: center;
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: contain;
}

.btn-container {
    text-align: center;
    margin-top: 30px;
}

.btn {
    background-color: #28a745;
    color: white;
    padding: 12px 25px;
    border: none;
    border-radius: 6px;
    text-decoration: none;
    font-size: 16px;
}

.remove-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 6px 12px;
    background: red;
    color: white;
    border-radius: 5px;
    text-decoration: none;
}

.empty {
    text-align: center;
    color: gray;
    font-size: 18px;
    margin-top: 50px;
}
</style>

</head>

<body>

<div class="container">

    <h2>🛒 Your Shopping Cart</h2>

    <!-- EMPTY CART -->
    <div th:if="${#lists.isEmpty(items)}" class="empty">
        Your cart is empty 😔
    </div>

    <!-- CART ITEMS -->
    <div class="cart-grid">

        <div class="card" th:each="item : ${items}">

            <img th:src="${item.imageUrl}" />

            <h3 th:text="${item.name}"></h3>

            <p>₹ <span th:text="${item.price}"></span></p>

            <!-- REMOVE -->
            <a class="remove-btn"
               th:href="@{'/removeFromCart?product=' + ${item.name}}">
               Remove
            </a>

        </div>

    </div>

    <!-- TOTAL -->
    <div style="text-align:center; margin-top:20px;">
        <h2>Total: ₹ <span th:text="${total}"></span></h2>
    </div>

    <!-- PROCEED -->
    <div class="btn-container" th:if="${!#lists.isEmpty(items)}">
        <a href="/checkout" class="btn">🛒 Proceed to Buy</a>
    </div>

</div>

</body>
</html>
