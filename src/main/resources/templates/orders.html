<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>My Orders</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
body { background:#f4f4f4; }

.header {
    background:#4f46e5; color:white;
    padding:15px 30px;
    display:flex; justify-content:space-between; align-items:center;
}

.container { width:85%; margin:30px auto; }

.card {
    background:white; padding:20px;
    margin:15px 0; border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h3 { margin-bottom:10px; color:#4f46e5; }
.card p { margin:6px 0; color:#555; }
.status-badge {
    display:inline-block;
    padding:4px 12px; border-radius:20px;
    background:#d1fae5; color:#065f46;
    font-weight:bold; font-size:13px;
}

/* TRACKING */
.tracking { margin-top:20px; }
.tracking b { font-size:15px; }
.steps {
    display:flex;
    margin-top:12px;
    position:relative;
}
.step {
    flex:1; text-align:center;
    padding:10px 5px; font-size:12px;
    background:#e5e7eb; color:#6b7280;
    border-radius:6px;
    margin-right:4px;
    position:relative;
}
.step.done {
    background:#4f46e5; color:white; font-weight:bold;
}
.step.current {
    background:#f59e0b; color:white; font-weight:bold;
}
.arrow {
    display:flex; align-items:center;
    color:#9ca3af; font-size:18px;
    margin-right:4px;
}

.empty {
    text-align:center; padding:50px;
    color:#999; font-size:18px;
}
</style>
</head>
<body>

<div class="header">
    <h3>📦 My Orders</h3>
    <a href="/customer/home" style="color:white; text-decoration:none;">← Back to Shop</a>
</div>

<div class="container">

    <div class="empty" th:if="${#lists.isEmpty(orders)}">
        😕 No orders yet. <a href="/customer/home">Start Shopping</a>
    </div>

    <div class="card" th:each="o : ${orders}">

        <h3>Order ID: <span th:text="${o.id}"></span></h3>

        <p>🛍 <b>Products:</b> <span th:text="${o.products}"></span></p>
        <p>💰 <b>Amount:</b> ₹ <span th:text="${o.totalAmount}"></span></p>
        <p>📅 <b>Date:</b> <span th:text="${o.orderDate}"></span></p>
        <p>🔖 <b>Status:</b> <span class="status-badge" th:text="${o.status}"></span></p>

        <!-- DYNAMIC TRACKING -->
        <div class="tracking">
            <b>🚚 Order Tracking</b>
            <div class="steps">

                <!-- PLACED -->
                <div th:classappend="${o.trackingStatus == 'PLACED'} ? 'current' :
                                     (${o.trackingStatus == 'PACKED' or o.trackingStatus == 'SHIPPED'
                                     or o.trackingStatus == 'OUT_FOR_DELIVERY'
                                     or o.trackingStatus == 'DELIVERED'} ? 'done' : '')"
                     class="step">✅ Order Placed</div>

                <div class="arrow">→</div>

                <!-- PACKED -->
                <div th:classappend="${o.trackingStatus == 'PACKED'} ? 'current' :
                                     (${o.trackingStatus == 'SHIPPED'
                                     or o.trackingStatus == 'OUT_FOR_DELIVERY'
                                     or o.trackingStatus == 'DELIVERED'} ? 'done' : '')"
                     class="step">📦 Packed</div>

                <div class="arrow">→</div>

                <!-- SHIPPED -->
                <div th:classappend="${o.trackingStatus == 'SHIPPED'} ? 'current' :
                                     (${o.trackingStatus == 'OUT_FOR_DELIVERY'
                                     or o.trackingStatus == 'DELIVERED'} ? 'done' : '')"
                     class="step">🚚 Shipped</div>

                <div class="arrow">→</div>

                <!-- OUT FOR DELIVERY -->
                <div th:classappend="${o.trackingStatus == 'OUT_FOR_DELIVERY'} ? 'current' :
                                     (${o.trackingStatus == 'DELIVERED'} ? 'done' : '')"
                     class="step">🏠 Out for Delivery</div>

                <div class="arrow">→</div>

                <!-- DELIVERED -->
                <div th:classappend="${o.trackingStatus == 'DELIVERED'} ? 'done' : ''"
                     class="step">✔ Delivered</div>

            </div>
        </div>

    </div>

</div>
</body>
</html>
