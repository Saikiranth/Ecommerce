<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Customer Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

/* Header */

.header{
    background:#4f46e5;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

.menu{
    display:flex;
    gap:20px;
}

.menu a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.search-box{
    display:flex;
}

.search-box input{
    padding:8px;
    width:250px;
    border:none;
    border-radius:5px 0 0 5px;
}

.search-box button{
    padding:8px 15px;
    border:none;
    background:#111827;
    color:white;
    border-radius:0 5px 5px 0;
    cursor:pointer;
}

/* Slider */

.slider{
    width:100%;
    height:350px;
    overflow:hidden;
}

.slider img{
    width:100%;
    height:350px;
    object-fit:cover;
}

/* Products */

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
    align-items: stretch;
}

.card {
    background: white;
    border-radius: 10px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);

    /* FIX SIZE ISSUE */
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: contain;
    border-radius: 10px;
}
.card h3{
    margin:10px 0;
}

.price{
    color:green;
    font-size:20px;
    font-weight:bold;
}

.btn{
    margin-top:10px;
    padding:10px 15px;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

.cart{
    background:#f59e0b;
    color:white;
}

.buy{
    background:#10b981;
    color:white;
}

</style>
</head>

<script>

let images=[
"/images/WatchScroll.jpg",
"/images/productsscroll.jpg",
"/images/Shirtsscroll.jpg"
];

let index=0;

setInterval(()=>{
    index=(index+1)%images.length;
    document.getElementById("slide").src=images[index];
},3000);

</script>
<!-- PROFILE MODAL -->
<div id="profileModal" style="display:none; position:fixed; top:0; left:0;
     width:100%; height:100%; background:rgba(0,0,0,0.5);
     justify-content:center; align-items:center; z-index:999;">

    <div style="background:white; padding:30px; border-radius:12px;
                width:350px; box-shadow:0 10px 30px rgba(0,0,0,0.2);">

        <h2 style="margin-bottom:20px; color:#4f46e5;">👤 My Profile</h2>

        <p style="margin:10px 0;"><b>Name:</b>
            <span th:text="${user != null} ? ${user.name} : 'N/A'"></span>
        </p>
        <p style="margin:10px 0;"><b>Email:</b>
            <span th:text="${user != null} ? ${user.email} : 'N/A'"></span>
        </p>
        <p style="margin:10px 0;"><b>Role:</b>
            <span th:text="${user != null} ? ${user.role} : 'N/A'"></span>
        </p>

        <button onclick="document.getElementById('profileModal').style.display='none'"
                style="margin-top:20px; padding:10px 20px; background:#4f46e5;
